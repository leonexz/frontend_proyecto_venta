<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <h2 class="text-center">Registrar Usuario</h2>

      <form #f="ngForm" (ngSubmit)="onRegister()">
        <div class="mb-3">
          <input type="text" class="form-control" [(ngModel)]="username" name="username" placeholder="Usuario" required>
        </div>

        <div class="mb-3">
          <input type="email" class="form-control" [(ngModel)]="email" name="email" placeholder="Email" required email>
        </div>

        <div class="mb-3">
          <input type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="Contraseña"
            required>
        </div>

        <button type="submit" class="btn btn-success w-100" [disabled]="f.invalid">
          Registrar
        </button>
      </form>

      <button type="button" class="btn btn-link w-100 mt-3" routerLink="/login">
        ¿Ya tienes cuenta? Inicia sesión
      </button>

    </div>
  </div>
</div>
