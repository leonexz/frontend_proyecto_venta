<div class="container mt-5" *ngIf="isAdmin">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Administrar Usuarios</h2>
    <button class="btn btn-secondary" (click)="logout()">Cerrar Sesión</button>
  </div>
  <table class="table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Usuario</th>
        <th>Email</th>
        <th>Rol</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.id }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.role }}</td>
        <td>
          <ul>
            <li *ngFor="let group of userGroups[user.id]">
              {{ group.name }}
              <button class="btn btn-sm btn-secondary" (click)="revokeGroup(user.id, group.id)">Revocar</button>
            </li>
          </ul>
        </td>
        <td>
          <select (change)="assignGroup(user.id, $event)">
            <option value="">Seleccionar grupo...</option>
            <option *ngFor="let group of allGroups" [value]="group.id" [disabled]="isGroupAssigned(user.id, group.id)">
              {{ group.name }}{{ isGroupAssigned(user.id, group.id) ? ' (asignado)' : '' }}
            </option>
          </select>
          <button class="btn btn-warning btn-sm" (click)="changePassword(user.id)">Cambiar Contraseña</button>
          <button class="btn btn-danger btn-sm" (click)="deleteUser(user.id)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
<div *ngIf="!isAdmin">Acceso denegado</div>
