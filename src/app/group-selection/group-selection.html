<div class="container mt-5">
  <div class="d-flex justify-content-end mb-3 gap-2">
    <button *ngIf="isAdmin" class="btn btn-primary" (click)="goToAdmin()">Ir a Admin</button>
    <button class="btn btn-secondary" (click)="logout()">Cerrar Sesión</button>
  </div>
  <div class="row justify-content-center">
    <div class="col-md-4">
      <h2 class="text-center">Seleccionar Grupo</h2>
      <div class="mb-3">
        <!-- El select usa [(ngModel)] para actualizar selectedGroup automáticamente -->
        <select class="form-select" [(ngModel)]="selectedGroup">
          <option *ngFor="let group of groups" [value]="group.name">{{ group.name }}</option>
        </select>
      </div>
      <button class="btn btn-success w-100" (click)="onSelect()">Seleccionar</button>
    </div>
  </div>
</div>
